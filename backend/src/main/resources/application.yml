spring:
  application:
    name: docbranch-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/docbranch}
    username: ${DB_USERNAME:docbranch}
    password: ${DB_PASSWORD:docbranch}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

management:
  endpoints:
    web:
      exposure:
        include: health

cloudflare:
  r2:
    endpoint: ${R2_ENDPOINT:}
    bucket: ${R2_BUCKET:}
    access-key: ${R2_ACCESS_KEY:}
    secret-key: ${R2_SECRET_KEY:}
